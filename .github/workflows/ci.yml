name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, ready_for_review, reopened]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  check-context:
    name: 🚦 Check Context
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    outputs:
      skip-checks: ${{ steps.detect.outputs.skip-checks }}
    steps:
      - name: Detect release-please PR
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_USER_LOGIN: ${{ github.event.pull_request.user.login || '' }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_COMMIT_AUTHOR: ${{ github.event.head_commit.author.name || '' }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          SKIP_CHECKS="false"

          # Detect release-please PR by branch name and PR author (immutable)
          if [[ "$EVENT_NAME" == "pull_request" ]] && \
             [[ "$PR_USER_LOGIN" == "tempo-release-bot[bot]" ]] && \
             [[ "$HEAD_REF" == release-please--branches--main* ]]; then
            SKIP_CHECKS="true"
          fi

          # Detect release-please merge commit on push using commit author (immutable).
          # Note: github.actor is the human who merged the PR, not the bot — so we
          # must check the commit author, which is set by release-please itself.
          if [[ "$EVENT_NAME" == "push" ]] && \
             [[ "$HEAD_COMMIT_AUTHOR" == "tempo-release-bot[bot]" ]] && \
             [[ "$HEAD_COMMIT_MSG" == chore\(main\):\ release* ]]; then
            SKIP_CHECKS="true"
          fi

          echo "skip-checks=$SKIP_CHECKS" >> "$GITHUB_OUTPUT"
          echo "skip-checks=$SKIP_CHECKS"

  schema-check:
    name: 🗃️ Schema Check
    runs-on: ubuntu-latest
    needs: check-context
    if: needs.check-context.outputs.skip-checks != 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Generate Room schemas
        run: ./gradlew kspDebugKotlin --scan

      - name: Verify schemas are up-to-date
        run: |
          CHANGES="$(git status --porcelain -- 'app/schemas/' || true)"
          if [ -n "$CHANGES" ]; then
            echo "::error::Room schema files are out of date. Build locally and commit the updated schemas."
            echo "$CHANGES"
            exit 1
          fi

  android-lint:
    name: 🤖 Android Lint
    runs-on: ubuntu-latest
    needs: check-context
    if: needs.check-context.outputs.skip-checks != 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Android lint
        run: ./gradlew lintDebug --scan

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  static-analysis:
    name: 📐 Static Analysis
    runs-on: ubuntu-latest
    needs: check-context
    if: needs.check-context.outputs.skip-checks != 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify detekt baseline has not grown
        run: |
          # The detekt baseline is frozen and may only shrink.
          # See AGENTS.md > CI / Quality Gates. Lower MAX when you fix issues.
          MAX=189
          COUNT=$(grep -c '<ID>' app/detekt-baseline.xml)
          echo "detekt baseline entries: $COUNT (ceiling: $MAX)"
          if [ "$COUNT" -gt "$MAX" ]; then
            echo "::error::detekt baseline grew to $COUNT (ceiling $MAX). The baseline may only shrink; fix new issues instead of suppressing them."
            exit 1
          fi

      - name: Run ktlint check
        run: ./gradlew ktlintCheck --scan

      - name: Run detekt
        run: ./gradlew :app:detekt --scan

      - name: Upload detekt results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-results
          path: app/build/reports/detekt/
          retention-days: 7

  unit-test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: check-context
    if: needs.check-context.outputs.skip-checks != 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --scan

      - name: Generate coverage reports
        if: always()
        run: ./gradlew koverHtmlReportDebug koverXmlReportDebug --scan

      - name: Verify coverage thresholds
        id: kover-verify
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew koverVerifyDebug 2>&1 | tee kover-verify-output.txt

      - name: Generate Kover summary
        if: always()
        run: |
          parse_counter() {
            local type=$1 report=$2
            local line
            line=$(grep -o "type=\"${type}\"[^/]*" "$report" | tail -1)
            local missed covered
            missed=$(echo "$line" | grep -o 'missed="[0-9]*"' | grep -o '[0-9]*')
            covered=$(echo "$line" | grep -o 'covered="[0-9]*"' | grep -o '[0-9]*')
            local total=$((missed + covered))
            if [ "$total" -gt 0 ]; then
              awk "BEGIN {printf \"%.1f\", $covered * 100.0 / $total}"
            else
              echo "0.0"
            fi
          }

          XML_REPORT=$(find app/build/reports/kover -name '*.xml' -type f 2>/dev/null | head -1)
          LINE_THRESHOLD=80
          BRANCH_THRESHOLD=70
          PASSED=true

          if [ -n "$XML_REPORT" ]; then
            LINE_PCT=$(parse_counter LINE "$XML_REPORT")
            BRANCH_PCT=$(parse_counter BRANCH "$XML_REPORT")

            if awk "BEGIN {exit !($LINE_PCT >= $LINE_THRESHOLD)}"; then
              LINE_EMOJI="✅"
            else
              LINE_EMOJI="❌"
              PASSED=false
            fi

            if awk "BEGIN {exit !($BRANCH_PCT >= $BRANCH_THRESHOLD)}"; then
              BRANCH_EMOJI="✅"
            else
              BRANCH_EMOJI="❌"
              PASSED=false
            fi
          else
            LINE_PCT="N/A"
            BRANCH_PCT="N/A"
            LINE_EMOJI="⚠️"
            BRANCH_EMOJI="⚠️"
            PASSED=false
          fi

          if [ "$LINE_PCT" = "N/A" ]; then
            LINE_DISPLAY="$LINE_PCT"
          else
            LINE_DISPLAY="${LINE_PCT}%"
          fi

          if [ "$BRANCH_PCT" = "N/A" ]; then
            BRANCH_DISPLAY="$BRANCH_PCT"
          else
            BRANCH_DISPLAY="${BRANCH_PCT}%"
          fi

          {
            echo "## 📊 Coverage summary"
            echo ""
            echo "| Metric | Threshold | Coverage | Status |"
            echo "| :--- | :--- | :--- | :---: |"
            echo "| Line coverage | ${LINE_THRESHOLD}% | ${LINE_DISPLAY} | ${LINE_EMOJI} |"
            echo "| Branch coverage | ${BRANCH_THRESHOLD}% | ${BRANCH_DISPLAY} | ${BRANCH_EMOJI} |"
            echo ""
            if [ "$PASSED" = "false" ]; then
              echo "> ⚠️ Coverage thresholds not met — review the report for details."
            else
              echo "> ✅ All coverage thresholds passed."
            fi
          } | tee kover-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Kover summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kover-summary
          path: kover-summary.md
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: app/build/reports/kover/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: app/build/reports/tests/
          retention-days: 14

      - name: Enforce coverage thresholds
        if: always() && steps.kover-verify.outcome == 'failure'
        run: |
          echo "::error::Coverage thresholds not met. See the coverage summary for details."
          exit 1

  android-test:
    name: 📱 Instrumented Tests
    runs-on: ubuntu-latest
    needs: check-context
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && needs.check-context.outputs.skip-checks != 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: ./gradlew :app:connectedDebugAndroidTest --scan

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-results
          path: app/build/reports/androidTests/
          retention-days: 14

  ci-status:
    name: ✅ CI Status
    runs-on: ubuntu-latest
    needs: [check-context, schema-check, android-lint, unit-test, android-test]
    if: >-
      always()
      && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.check-context.outputs.skip-checks }}" == "true" ]]; then
            echo "Skipped checks (release-please PR or merge commit)"
            exit 0
          fi

          if [[ "${{ needs.schema-check.result }}" != "success" ]]; then
            echo "::error::Schema check failed"
            exit 1
          fi
          if [[ "${{ needs.android-lint.result }}" != "success" ]]; then
            echo "::error::Android lint failed; check the uploaded lint report for details"
            exit 1
          fi
          if [[ "${{ needs.unit-test.result }}" != "success" ]]; then
            echo "::error::Unit tests failed"
            exit 1
          fi
          # android-test only runs on push to main; require it when it ran
          if [[ "${{ needs.android-test.result }}" != "success" && "${{ needs.android-test.result }}" != "skipped" ]]; then
            echo "::error::Instrumented tests failed"
            exit 1
          fi
          # static-analysis (ktlint + detekt) remains continue-on-error (advisory)
          echo "All required checks passed"

  release-please:
    name: 🏷️ Release
    runs-on: ubuntu-latest
    needs: ci-status
    permissions:
      contents: write
      pull-requests: write
    if: >-
      always()
      && needs.ci-status.result == 'success'
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    concurrency:
      group: release
      cancel-in-progress: false
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
