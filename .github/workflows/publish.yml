name: Publish
run-name: "Publish ${{ github.event.release.tag_name || inputs.tag }}"

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.6.0 or 0.6.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: 📦 Publish
    runs-on: ubuntu-latest
    environment: google-play
    steps:
      - name: Resolve tag
        id: version
        run: |
          RAW="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. Cannot build a release."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/app/release.keystore"
          echo "KEYSTORE_FILE=${{ github.workspace }}/app/release.keystore" >> "$GITHUB_ENV"

      - name: Build release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename artifacts
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mv app/build/outputs/bundle/release/app-release.aab app/build/outputs/bundle/release/tempo-$VERSION.aab
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/tempo-$VERSION.apk

      - name: Upload release AAB
        uses: actions/upload-artifact@v7
        with:
          name: tempo-${{ steps.version.outputs.version }}.aab
          path: app/build/outputs/bundle/release/tempo-${{ steps.version.outputs.version }}.aab
          retention-days: 90

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: tempo-${{ steps.version.outputs.version }}.apk
          path: app/build/outputs/apk/release/tempo-${{ steps.version.outputs.version }}.apk
          retention-days: 90

      - name: Attach APK to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            app/build/outputs/apk/release/tempo-${{ steps.version.outputs.version }}.apk \
            --clobber

      - name: Generate Play Store changelog
        run: ./scripts/generate-whatsnew.sh "${{ steps.version.outputs.version }}"

      - name: Validate changelog links are stripped
        run: |
          if grep -R -n -E 'https://github\.com/[^/]+/[^/]+/(issues|pull)/[0-9]+' distribution/whatsnew/; then
            echo "::error::Play Store changelog still contains GitHub issue/PR links."
            exit 1
          fi

      - name: Publish to Google Play Closed Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.mandrecode.tempo
          releaseFiles: app/build/outputs/bundle/release/tempo-${{ steps.version.outputs.version }}.aab
          tracks: alpha
          whatsNewDirectory: distribution/whatsnew
