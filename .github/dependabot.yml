version: 2
updates:
  # 1. Android Dependencies (Gradle)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    groups:
      compose:
        patterns:
          - "androidx.compose*"
      androidx:
        patterns:
          - "androidx*"
          - "com.google.android.material*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
      google:
        patterns:
          - "com.google.dagger*"
          - "com.google.devtools.ksp*"
          - "com.google.android.gms*"
    commit-message:
      prefix: "android"
      include: "scope"

  # 2. CI/CD Workflows (GitHub Actions)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
